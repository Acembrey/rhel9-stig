---
# =============================================================================
# playbooks/stig_packer.yml
#
# TARGET:   Golden image build (Packer provisioner / AWS AMI / QEMU)
# ROLES:    RedHatOfficial.rhel9_stig
#
# Key differences from a live-system playbook:
#   - reboot_required / no_reboot_needed: Packer handles reboots via its own
#     reboot provisioner block — the role's handlers fire but the host is
#     transient, so we accept the single required reboot after FIPS is set.
#   - AIDE DB build is skipped here; the first-boot systemd unit or a
#     post-deploy Ansible run should initialise it.
#   - rsyslog_remote_loghost points to /dev/null equivalent until the image
#     is deployed and the real SIEM address is injected via cloud-init/userdata.
#   - USBGuard policy generation is skipped — the build host's USB topology
#     differs from the target workstation.
#
# USAGE (called from Packer HCL as an Ansible provisioner):
#   ansible-playbook -i "{{ .Host }}," --extra-vars "ansible_port={{ .Port }}"  \
#     playbooks/stig_packer.yml
# =============================================================================

- name: DISA STIG RHEL 9 — Golden Image Build
  hosts: all
  become: true
  gather_facts: true

  vars_files:
    - ../vars/profiles/stig_defaults.yml

  vars:

    # -------------------------------------------------------------------------
    # Build-time overrides
    # -------------------------------------------------------------------------

    # AIDE — skip building the initial DB during image build.
    # The firstboot or post-deployment playbook should run aide --init.
    aide_build_database:        false
    DISA_STIG_RHEL_09_631020:   false  # aide_build_database STIG ID

    # USBGuard — do not generate policy from the Packer build host's USB bus.
    # The deployed host will have a different device topology.
    usbguard_generate_policy:   false

    # rsyslog remote — placeholder during build; override via userdata/cloud-init.
    rsyslog_remote_loghost_address: "127.0.0.1"

    # Postfix alias — set to something safe for the base image.
    var_postfix_root_mail_alias: "root@localhost"

    # auditd failure mode: keep at 2 (halt) for production images.
    # Override to 1 during development image builds if needed.
    # var_audit_failure_mode: "2"

  roles:
    - role: RedHatOfficial.rhel9_stig
