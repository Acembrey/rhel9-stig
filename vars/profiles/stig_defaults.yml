# =============================================================================
# vars/profiles/stig_defaults.yml
#
# PURPOSE:
#   This is the canonical "what gets applied" file for ALL playbooks in this
#   project. Every STIG control toggle from defaults/main.yml is reproduced
#   here. Controls are ON (true) by default, matching the upstream role.
#
#   To DISABLE a control across all playbooks that import this file, set it
#   to false here. To override in a specific playbook only, set it in that
#   playbook's vars: block (playbook vars win over vars_files).
#
# VARIABLE PRECEDENCE (highest to lowest relevant layers):
#   1. --extra-vars / -e on the CLI
#   2. playbook vars: block
#   3. THIS FILE (vars_files)
#   4. role defaults/main.yml
#
# STIG ID FORMAT:  DISA_STIG_RHEL_09_NNNNNN
# TASK NAME FORMAT (also toggled): snake_case functional name
#
# Controls are grouped by their STIG family (first 3 digits of the ID):
#   171 - Documented Risk Acceptance
#   211 - Operating System / General
#   212 - Boot / Bootloader
#   213 - Packages / Software
#   214 - Crypto Policy
#   215 - Supplemental: Packages
#   231 - Filesystem Mount Options
#   232 - File Permissions / Ownership
#   251 - Network sysctl
#   252 - IPv4 sysctl
#   253 - IPv6 sysctl
#   254 - Firewall
#   255 - SSH
#   271 - Audit rules
#   291 - Audit daemon configuration
#   411 - User accounts / PAM
#   412 - Password quality
#   431 - sudo
#   432 - SELinux
#   433 - fapolicyd
#   611 - Logging (rsyslog / journald)
#   631 - AIDE
#   651 - Smartcard / PIV
#   652 - SSSD
#   653 - Audit rules (DAC/privilege)
#   654 - Audit rules (extended)
#   671 - USBGuard
#   672 - Kernel module blocking
# =============================================================================

