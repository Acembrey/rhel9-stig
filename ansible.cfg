[defaults]
# Roles path: check local roles/ first, then the Galaxy-installed path
roles_path        = ./roles:~/.ansible/roles
collections_path  = ./collections:~/.ansible/collections
inventory         = ./inventory/hosts
# Show task timing and host summary
callback_whitelist = timer, profile_tasks
stdout_callback   = default
# Suppress deprecation noise from ComplianceAsCode-generated tasks
deprecation_warnings = False
# STIG tasks are idempotent; retries waste time
retry_files_enabled = False
# Required for most STIG tasks
host_key_checking = False
# If running remotely
# remote_user = 

[privilege_escalation]
become      = True
become_method = sudo

[ssh_connection]
pipelining  = True
